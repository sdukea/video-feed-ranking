name: Score user feeds

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes — tune as needed
  workflow_dispatch: {}       # lets you trigger it manually from GitHub's UI

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r video_feed_ml/requirements.txt
      - run: python video_feed_ml/score_feed.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
